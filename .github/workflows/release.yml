name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - filter: core
            workspace: packages/humn
            needs-vsce: false
          - filter: prettier
            workspace: packages/prettier-plugin-humn
            needs-vsce: false
          - filter: vite
            workspace: packages/vite-plugin-humn
            needs-vsce: false
          - filter: extension
            workspace: packages/humn-vscode
            needs-vsce: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/humn/**'
              - '.github/workflows/release.yml'
            prettier:
              - 'packages/prettier-plugin-humn/**'
              - '.github/workflows/release.yml'
            vite:
              - 'packages/vite-plugin-humn/**'
              - '.github/workflows/release.yml'
            extension:
              - 'packages/humn-vscode/**'
              - '.github/workflows/release.yml'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        if: ${{ steps.filter.outputs[matrix.filter] == 'true' }}
        run: npm run build --if-present -w ${{ matrix.workspace }}

      - name: Test package
        if: ${{ steps.filter.outputs[matrix.filter] == 'true' }}
        run: npm run qa:test --if-present -w ${{ matrix.workspace }}

      - name: Install vsce
        if: ${{ steps.filter.outputs[matrix.filter] == 'true' && matrix.needs-vsce }}
        run: npm install -g @vscode/vsce

      - name: Release package
        if: ${{ steps.filter.outputs[matrix.filter] == 'true' }}
        working-directory: ${{ matrix.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_TOKEN }}
        run: npx semantic-release
